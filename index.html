<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run & Walk Challenge Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Profile Header Card -->
        <header class="profile-header-card">
            <div class="header-left">
                <div class="avatar-container">
                    <span class="avatar-emoji">🏃</span>
                </div>
                <div class="greeting-container">
                    <span id="greeting-label" class="greeting-label">GOOD EVENING 🌙</span>
                    <h1 class="greeting-name">CHALLENGE<span class="dot">.</span></h1>
                    <p class="greeting-subtitle">Here's what's happening in the challenge today.</p>
                </div>
            </div>
            
            <div class="header-right">
                <div class="metric-widget">
                    <div class="metric-icon-bg">
                        <svg class="metric-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div class="metric-text">
                        <span class="metric-label">DISTANCE</span>
                        <span id="stat-distance" class="metric-value">0.00 mi</span>
                    </div>
                </div>
                
                <div class="metric-widget">
                    <div class="metric-icon-bg">
                        <svg class="metric-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                        </svg>
                    </div>
                    <div class="metric-text">
                        <span class="metric-label">ATHLETES</span>
                        <span id="stat-athletes" class="metric-value">0</span>
                    </div>
                </div>
                
                <div class="metric-widget">
                    <div class="metric-icon-bg">
                        <svg class="metric-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M18 2H6c-1.1 0-2 .9-2 2v1c0 2.5 1.71 4.6 4 5.16V17h-3v2h10v-2h-3v-6.84c2.29-.56 4-2.66 4-5.16V4c0-1.1-.9-2-2-2zm-1 3H7V4h10v1z"/>
                        </svg>
                    </div>
                    <div class="metric-text">
                        <span class="metric-label">LEADER</span>
                        <span id="stat-leader" class="metric-value">-</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Navigation Tabs Bar -->
        <nav class="nav-bar">
            <div class="nav-tabs">
                <button id="tab-individuals" class="nav-tab active">INDIVIDUALS</button>
                <button id="tab-teams" class="nav-tab">TEAMS</button>
            </div>
            <div class="nav-actions">
                <button class="icon-btn" title="View Analytics">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                    </svg>
                </button>
                <button id="btn-sync" class="btn-primary">
                    <span>Sync Strava</span>
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path fill="currentColor" d="M13.13 22.19L11.5 18.36 9.87 22.19 6.27 20.36 9.3 17.51l-4-1.28.87-3.87 3.86.87-.87 3.86 4 1.28 1.63-3.83 1.63 3.83 4-1.28-.87-3.86 3.86-.87.87 3.87-4 1.28 3.03 2.85-3.6 1.83zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/>
                    </svg>
                </button>
            </div>
        </nav>

        <!-- Filters Bar -->
        <div class="filters-bar">
            <div class="search-input-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
                    <path fill="none" stroke="currentColor" stroke-width="2" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input id="search-input" type="text" placeholder="Search athletes or updates..." />
            </div>
            
            <div class="filters-dropdowns">
                <!-- Team Filter -->
                <div class="dropdown-wrapper">
                    <select id="team-filter">
                        <option value="all">Team: All</option>
                        <option value="Group 1">Group 1</option>
                        <option value="Group 2">Group 2</option>
                        <option value="Group 3">Group 3</option>
                        <option value="Group 4">Group 4</option>
                        <option value="No Team">No Team</option>
                    </select>
                    <svg class="dropdown-arrow" viewBox="0 0 24 24" width="16" height="16">
                        <path fill="currentColor" d="M7 10l5 5 5-5H7z"/>
                    </svg>
                </div>
                
                <!-- Activity Filter -->
                <div class="dropdown-wrapper">
                    <select id="activity-filter">
                        <option value="all">Activity: All</option>
                        <option value="Run">Runs Only</option>
                        <option value="Walk">Walks Only</option>
                    </select>
                    <svg class="dropdown-arrow" viewBox="0 0 24 24" width="16" height="16">
                        <path fill="currentColor" d="M7 10l5 5 5-5H7z"/>
                    </svg>
                </div>
            </div>

            <div class="filters-right-meta">
                <span id="record-count-badge" class="count-badge">0</span>
                
                <button class="icon-btn" title="Sort Order">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path fill="currentColor" d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/>
                    </svg>
                </button>
                
                <button class="icon-btn" title="Information">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Leaderboard List Section -->
        <main class="leaderboard-panel">
            <div id="leaderboard-list" class="leaderboard-list">
                <!-- JavaScript will populate items dynamically -->
                <div class="loading-state">Loading challenge data...</div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
